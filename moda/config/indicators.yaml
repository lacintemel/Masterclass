    - "WScript.Shell"
    - "PowerShell"
    - "cmd.exe"
    - "CreateObject"
    - "GetObject"
    - "CallByName"
    - "Environ"
    - "URLDownloadToFile"
    - "XMLHTTP"
    - "ADODB.Stream"
    - "Msxml2.XMLHTTP"
    - "WinHttp.WinHttpRequest"
    - "ShellExecute"
    - "RegWrite"
    - "RegRead"
    - "RegDelete"
    - "Kill"
    - "FileCopy"
    - "CopyFile"
    - "MoveFile"
    - "DeleteFile"
    - "SaveToFile"
    - "BinaryWrite"

  medium_severity:
    - "Open"
    - "Write"
    - "Put"
    - "Print #"
    - "Input #"
    - "Binary"
    - "Access Read"
