# Obfuscation patterns that may indicate deliberate code concealment.
obfuscation_patterns:
  string_concatenation:
    description: "Excessive string concatenation to hide keywords"
    pattern: '(?:Chr\(\d+\)\s*[&+]\s*){3,}'
    severity: "high"

  char_code_construction:
    description: "Building strings character by character using Chr/ChrW"
    pattern: 'Chr[Ww]?\(\d+\)'
    severity: "medium"

  base64_encoded_blocks:
    description: "Large blocks of base64-encoded data"
    pattern: '[A-Za-z0-9+/]{50,}={0,2}'
    severity: "high"

  hex_encoded_blocks:
    description: "Long sequences of hex-encoded data"
    pattern: '(?:[0-9A-Fa-f]{2}){20,}'
    severity: "medium"

  replace_deobfuscation:
    description: "Use of Replace function to deobfuscate strings"
    pattern: 'Replace\(.+?,\s*".+?",\s*".+?"\)'
    severity: "medium"

  split_join_obfuscation:
    description: "Use of Split/Join to reconstruct hidden strings"
    pattern: 'Join\(Split\('
    severity: "medium"

  execute_from_string:
    description: "Dynamic code execution from constructed strings"
    pattern: '(?:Eval|Execute|ExecuteGlobal|Run)\s*\('
    severity: "critical"

  environment_variable_abuse:
    description: "Using environment variables to hide values"
    pattern: "Environ\\(\\s*[\"'].+?[\"']\\s*\\)"
    severity: "medium"

  wmi_execution:
    description: "WMI-based code execution"
    pattern: "GetObject\\(\\s*[\"']winmgmts:"
    severity: "high"

  scheduled_task_creation:
    description: "Creating scheduled tasks for persistence"
    pattern: 'schtasks\s*/create'
    severity: "critical"

