# MODA Scoring Configuration
# Defines weights and thresholds for risk scoring of analyzed documents.

# Maximum possible risk score for a single document analysis.
max_score: 100

# Risk level thresholds – a document's total score maps to one of these levels.
# Boundaries are inclusive on the lower bound and exclusive on the upper bound.
risk_levels:
  low:
    min_score: 0
    max_score: 25
    label: "Low Risk"
    color: "green"
    description: "No significant threats detected. Document appears benign."

  medium:
    min_score: 25
    max_score: 50
    label: "Medium Risk"
    color: "yellow"
    description: "Some suspicious indicators found. Manual review recommended."

  high:
    min_score: 50
    max_score: 75
    label: "High Risk"
    color: "orange"
    description: "Multiple threat indicators detected. Likely malicious content."

  critical:
    min_score: 75
    max_score: 100
    label: "Critical Risk"
    color: "red"
    description: "Strong evidence of malicious intent. Do not open or execute."

# Weights applied to findings based on their severity.
# The finding's severity weight is multiplied by the category weight to
# compute its contribution to the overall risk score.
severity_weights:
  info: 0
  low: 5
  medium: 15
  high: 30
  critical: 50

# Per-category multipliers that amplify or dampen the impact of findings
# from specific analyzer categories.
category_weights:
  macro: 1.5
  embedded: 1.3
  metadata: 0.8
  relationship: 1.2
  yara: 1.6
  pdf: 1.4
  rtf: 1.3
  other: 1.0

# Score caps per category prevent a single analyzer from dominating the total.
category_caps:
  macro: 60
  embedded: 50
  metadata: 30
  relationship: 50
  yara: 70
  pdf: 60
  rtf: 55
  other: 40

# Bonus points applied when certain combinations of findings co-occur.
compound_indicators:
  - name: "macro_with_obfuscation"
    description: "Macros detected alongside obfuscation techniques"
    required_categories:
      - macro
      - other
    bonus_score: 15

  - name: "macro_with_urls"
    description: "Macros detected alongside suspicious URLs"
    required_categories:
      - macro
      - relationship
    bonus_score: 10

  - name: "macro_with_embedded_pe"
    description: "Macros detected alongside embedded PE files"
    required_categories:
      - macro
      - embedded
    bonus_score: 20

  - name: "obfuscation_with_urls"
    description: "Obfuscation detected alongside suspicious URLs"
    required_categories:
      - other
      - relationship
    bonus_score: 10

  - name: "pdf_js_with_actions"
    description: "JavaScript in PDF with automatic actions"
    required_categories:
      - pdf
      - relationship
    bonus_score: 15
