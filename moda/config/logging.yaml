# MODA Logging Configuration
# Standard Python logging config for console and file output.

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)-8s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  detailed:
    format: "%(asctime)s [%(levelname)-8s] %(name)s (%(filename)s:%(lineno)d): %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  brief:
    format: "[%(levelname)-8s] %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: brief
    stream: ext://sys.stderr

loggers:
  moda:
    level: DEBUG
    handlers:
      - console
    propagate: false

  moda.core:
    level: DEBUG
    handlers: []
    propagate: true

  moda.analyzers:
    level: DEBUG
    handlers: []
    propagate: true

  moda.utils:
    level: DEBUG
    handlers: []
    propagate: true

root:
  level: WARNING
  handlers:
    - console
