services:
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"

  gateway:
    build: .
    restart: unless-stopped
    environment:
      SMTP_LISTEN_HOST: "0.0.0.0"
      SMTP_LISTEN_PORT: "${SMTP_LISTEN_PORT:-2525}"
      RELAY_HOST: "${RELAY_HOST:-mailpit}"
      RELAY_PORT: "${RELAY_PORT:-1025}"
      HEALTH_HOST: "0.0.0.0"
      HEALTH_PORT: "${HEALTH_PORT:-8080}"
      WEB_UI_HOST: "0.0.0.0"
      WEB_UI_PORT: "${WEB_UI_PORT:-8081}"
      SIMULATE_ANALYZER: "${SIMULATE_ANALYZER:-true}"
      ANALYZER_URL: "${ANALYZER_URL:-http://analyzer:8000/analyze}"
      SKIP_YARA: "${SKIP_YARA:-false}"
      MAX_MESSAGE_BYTES: "${MAX_MESSAGE_BYTES:-26214400}"
      MAX_ATTACHMENT_BYTES: "${MAX_ATTACHMENT_BYTES:-20971520}"
      MAX_ATTACHMENTS: "${MAX_ATTACHMENTS:-20}"
      ANALYZER_TIMEOUT_SECONDS: "${ANALYZER_TIMEOUT_SECONDS:-30}"
      ACCEPTED_RECIPIENT_DOMAINS: "${ACCEPTED_RECIPIENT_DOMAINS:-example.test}"
      QUARANTINE_PATH: "${QUARANTINE_PATH:-/quarantine}"
    depends_on:
      - mailpit
    ports:
      - "127.0.0.1:${SMTP_LISTEN_PORT:-2525}:${SMTP_LISTEN_PORT:-2525}"
      - "127.0.0.1:${HEALTH_PORT:-8080}:${HEALTH_PORT:-8080}"
      - "127.0.0.1:${WEB_UI_PORT:-8081}:${WEB_UI_PORT:-8081}"
    volumes:
      - ./quarantine:/quarantine
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:${HEALTH_PORT:-8080}/health')); raise SystemExit(data['status'] != 'healthy')"
      interval: 10s
      timeout: 3s
      retries: 5
